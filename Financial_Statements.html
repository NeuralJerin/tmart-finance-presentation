<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#F4EDE3;color:#333}
.header{background:linear-gradient(135deg,#411517,#5c2224);color:#fff;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.header h1{font-size:24px;font-weight:600;letter-spacing:.5px}
.header .subtitle{font-size:13px;opacity:.7;margin-top:3px}
.tabs{display:flex;background:#411517;padding:0 20px;gap:2px;overflow-x:auto}
.tab{padding:12px 22px;color:#d4a59a;cursor:pointer;font-size:13px;font-weight:500;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}
.tab:hover{color:#fff;background:rgba(255,255,255,.08)}
.tab.active{color:#fff;border-bottom-color:#FF5900;background:rgba(255,89,0,.15)}
.controls-bar{background:#fff;padding:15px 30px;border-bottom:1px solid #d9cfc2;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.controls-bar label{font-size:13px;font-weight:600;color:#411517;min-width:55px}
.date-display{background:#ebe3d7;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;color:#411517;min-width:100px;text-align:center}
.month-picker{background:#fff;padding:15px 30px 10px;border-bottom:1px solid #d9cfc2}
.month-picker .mp-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.month-picker .mp-toolbar label{font-size:13px;font-weight:600;color:#411517}
.mp-btn{padding:4px 12px;border:1px solid #c4b8aa;border-radius:6px;font-size:11px;font-weight:600;background:#fff;color:#411517;cursor:pointer;transition:all .15s}
.mp-btn:hover{background:#ebe3d7;border-color:#FF5900}
.mp-btn.active{background:#FF5900;color:#fff;border-color:#FF5900}
.mp-year-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.mp-year-label{font-size:12px;font-weight:700;color:#411517;min-width:42px;cursor:pointer;user-select:none;padding:3px 6px;border-radius:4px;transition:background .15s}
.mp-year-label:hover{background:#ebe3d7}
.mp-chip{padding:4px 10px;border:1.5px solid #c4b8aa;border-radius:6px;font-size:11px;font-weight:500;background:#fff;color:#7a6b5e;cursor:pointer;transition:all .15s;user-select:none}
.mp-chip:hover{border-color:#FF5900;color:#411517}
.mp-chip.selected{background:#FF5900;color:#fff;border-color:#FF5900}
.mp-range-inputs{display:flex;align-items:center;gap:8px}
.mp-range-inputs select{padding:5px 10px;border:1.5px solid #c4b8aa;border-radius:6px;font-size:12px;background:#fff;cursor:pointer}
.mp-range-inputs span{font-size:12px;color:#7a6b5e}
.entity-select{padding:7px 14px;border:2px solid #FF5900;border-radius:8px;font-size:13px;font-weight:600;background:#fff;color:#411517;cursor:pointer;outline:none;min-width:150px}
.entity-select:focus{border-color:#cc4700;box-shadow:0 0 0 3px rgba(255,89,0,.2)}
.entity-select option{font-weight:500}
.content{padding:20px 30px;max-width:1400px;margin:0 auto}
.tab-content{display:none}
.tab-content.active{display:block}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:20px}
table th{background:#411517;color:#fff;padding:10px 15px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
table th.num{text-align:right}
table td{padding:9px 15px;border-bottom:1px solid #ebe3d7;font-size:13px}
table td.num{text-align:right;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:500}
table td.num.negative{color:#e53e3e}
table td.num.positive{color:#4a7c10}
table tr:hover{background:#faf6f0}
table tr.section-header td{background:#ebe3d7;font-weight:700;font-size:13px;color:#411517;border-top:2px solid #c4b8aa}
table tr.subtotal td{font-weight:700;border-top:2px solid #411517;background:#faf6f0;font-size:13px}
table tr.grand-total td{font-weight:700;border-top:3px double #411517;background:#ebe3d7;font-size:14px;color:#411517}
table tr.spacer td{height:10px;border:none;background:#fff}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:20px;margin-bottom:20px}
.card h3{font-size:16px;color:#411517;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #FF5900}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.kpi-card{background:#fff;border-radius:8px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #FF5900}
.kpi-card.red{border-left-color:#e53e3e}
.kpi-card.green{border-left-color:#CFFF00}
.kpi-card.blue{border-left-color:#411517}
.kpi-card.purple{border-left-color:#FF5900}
.kpi-card .kpi-label{font-size:11px;text-transform:uppercase;color:#7a6b5e;letter-spacing:.5px;margin-bottom:4px}
.kpi-card .kpi-value{font-size:22px;font-weight:700;color:#411517;font-family:'Montserrat',sans-serif}
.kpi-card .kpi-value.negative{color:#e53e3e}
.kpi-card .kpi-value.positive{color:#4a7c10}
.detail-row{display:none}
.detail-row td{padding-left:40px;font-size:12px;color:#7a6b5e}
.detail-row.visible{display:table-row}
.entity-badge{display:inline-block;background:#FF5900;color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-left:8px}
.action-btn{padding:8px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.action-btn.excel{background:#FF5900;color:#fff}.action-btn.excel:hover{background:#cc4700}
.action-btn.print{background:#411517;color:#fff}.action-btn.print:hover{background:#5c2224}
.action-btn.refresh{background:#CFFF00;color:#411517}.action-btn.refresh:hover{background:#b8e600}
.action-bar{display:flex;gap:10px;align-items:center}
@media print{.tabs,.controls-bar,.month-picker,.action-bar,.kpi-grid,.bs-chart-container{display:none!important}.header{background:none!important;color:#411517!important;box-shadow:none!important;padding:10px 0!important;border-bottom:2px solid #411517}.header h1{color:#411517!important}.header .subtitle{color:#7a6b5e!important;opacity:1!important}.header-logo{fill:#ff5a00!important}.content{padding:0!important}.tab-content{display:block!important;page-break-after:always}.tab-content:before{content:attr(data-title);font-size:18px;font-weight:700;display:block;margin-bottom:10px;border-bottom:2px solid #000}table{font-size:11px!important;box-shadow:none!important}table th{background:#eee!important;color:#000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}table td.num.negative{color:#c00!important}table td.num.positive{color:#060!important}}
@media(max-width:768px){.content{padding:10px}.tabs{padding:0 10px}.tab{padding:10px 14px;font-size:12px}.header{padding:15px}.kpi-grid{grid-template-columns:1fr 1fr}.controls-bar{padding:10px 15px}}
</style>
</head>

function clearBSSegs(){bsChartSegs.clear();renderBS()}
function filterBSAccts(el){bsChartSearch=el.value.toLowerCase();document.querySelectorAll('.bs-acct-chip').forEach(c=>{c.style.display=c.dataset.name.toLowerCase().includes(bsChartSearch)?'':'none'})}

function fmt(val){if(val===0||val===undefined||val===null||isNaN(val))return '-';const abs=Math.abs(val);const f=abs>=1000?abs.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}):abs.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return val<0?'('+f+')':f}
function numClass(val){if(val===0||val===undefined||val===null||isNaN(val))return 'num';return val<0?'num negative':'num positive'}
function getBSData(dateKey){return(DATA.bs[currentEntity]&&DATA.bs[currentEntity][dateKey])||{A:{},L:{},E:{}}}
function getAssets(dateKey){const d=getBSData(dateKey);return d.A||{}}
function getLiabilities(dateKey){const d=getBSData(dateKey);return d.L||{}}
function getEquity(dateKey){const d=getBSData(dateKey);return d.E||{}}
function getPNL(dateKey){return(DATA.pnl[currentEntity]&&DATA.pnl[currentEntity][dateKey])||{}}
function getPNLDetail(dateKey){return(DATA.pnlDetail[currentEntity]&&DATA.pnlDetail[currentEntity][dateKey])||{}}
function gv(obj,seg){if(!obj)return 0;const v=obj[seg];if(v===undefined||v===null)return 0;if(typeof v==='object'){let s=0;Object.values(v).forEach(x=>{s+=(x||0)});return s}return v}

function selSorted(){return[...selectedIndices].sort((a,b)=>a-b)}
function lastSelIdx(){const s=selSorted();return s.length?s[s.length-1]:dates.length-1}
function firstSelIdx(){const s=selSorted();return s.length?s[0]:0}
function sumPNLForSelected(){const agg={};selSorted().forEach(i=>{const p=getPNL(dates[i].key);Object.keys(p).forEach(k=>{agg[k]=(agg[k]||0)+p[k]})});return agg}
function sumPNLDetailForSelected(){const agg={};selSorted().forEach(i=>{const d=getPNLDetail(dates[i].key);Object.keys(d).forEach(k=>{agg[k]=(agg[k]||0)+d[k]})});return agg}
function selLabel(){const s=selSorted();if(!s.length)return 'None';if(s.length===1)return dates[s[0]].label;const c=s.every((v,i)=>i===0||v===s[i-1]+1);if(c)return dates[s[0]].label+' - '+dates[s[s.length-1]].label;if(s.length<=3)return s.map(i=>dates[i].label).join(', ');return s.length+' months selected'}

function sumSection(obj){let s=0;if(!obj)return 0;Object.values(obj).forEach(v=>{if(typeof v==='object'){Object.values(v).forEach(x=>{s+=(x||0)})}else{s+=(v||0)}});return s}

function calcNetIncome(pnlData){
  const rev=-(pnlData['Revenue']||0);const cos=(pnlData['Cost of sales']||0);const gross=rev-cos;
  const pe=(pnlData['Personnel']||0);const np=-(pnlData['Non personnel']||0);
  const oh=(pnlData['Overheads']||0);const ca=(pnlData['CAC']||0);
  const opex=pe+np+oh+ca;const ebitda=gross-opex;const be=(pnlData['Below EBITDA']||0);return ebitda-be;
}

    bsChartSegList=allSegs.map(s=>s.key);
    html+='<div class="card bs-chart-container"><h3>Balance Sheet Trend</h3>';

    allSegs.forEach((s,idx)=>{const sel2=bsChartSegs.has(s.key);const vis=!bsChartSearch||s.name.toLowerCase().includes(bsChartSearch);const typeTag=s.typeKey==='a'?'A':s.typeKey==='l'?'L':'E';html+='<span class="mp-chip bs-acct-chip'+(sel2?' selected':'')+'" data-name="'+s.name.replace(/"/g,'&quot;')+'" onclick="toggleBSSeg('+idx+')" style="font-size:10px;padding:3px 8px;display:'+(vis?'inline-block':'none')+(sel2?';background:'+segColors[s.key]+';border-color:'+segColors[s.key]+';color:#fff':'')+'" title="'+s.type+'"><span style="font-size:8px;opacity:.7;margin-right:2px">'+typeTag+'</span>'+s.name+'</span>'});

      const segList=[...bsChartSegs];

// === PROFIT & LOSS ===
function renderPNL(){
  const sel=selSorted();if(!sel.length){document.getElementById('tab-pnl').innerHTML='<p>Select at least one month.</p>';return}
  const cols=sel.length<=6?sel:[sel[0],sel[sel.length-1]];const showTotal=cols.length>1;
  function pnlCalc(p){const rev=-(p['Revenue']||0);const cos=(p['Cost of sales']||0);const gross=rev-cos;const pe=(p['Personnel']||0);const np=-(p['Non personnel']||0);const oh=(p['Overheads']||0);const ca=(p['CAC']||0);const opex=pe+np+oh+ca;const ebitda=gross-opex;const be=(p['Below EBITDA']||0);const ni=ebitda-be;return{rev,cos,gross,pe,np,oh,ca,opex,ebitda,be,ni}}
  const colData=cols.map(ci=>pnlCalc(getPNL(dates[ci].key)));

  const gm=tot.rev!==0?(tot.gross/tot.rev*100).toFixed(1):'-';const em=tot.rev!==0?(tot.ebitda/tot.rev*100).toFixed(1):'-';const nm=tot.rev!==0?(tot.ni/tot.rev*100).toFixed(1):'-';
  let html='<div class="kpi-grid">';

  html+='<div class="kpi-card '+(tot.ebitda>=0?'green':'red')+'"><div class="kpi-label">EBITDA ('+em+'%)</div><div class="kpi-value '+(tot.ebitda>=0?'positive':'negative')+'">'+fmt(tot.ebitda)+'</div></div>';
  html+='<div class="kpi-card '+(tot.ni>=0?'green':'red')+'"><div class="kpi-label">Net Income ('+nm+'%)</div><div class="kpi-value '+(tot.ni>=0?'positive':'negative')+'">'+fmt(tot.ni)+'</div></div>';
  html+='</div>';
  const nc=1+cols.length+(showTotal?1:0)+1;
  html+='<table><thead><tr><th>Line Item</th>';
  cols.forEach(ci=>{html+='<th class="num" style="font-size:11px">'+dates[ci].label+'</th>'});
  if(showTotal)html+='<th class="num">Total</th>';
  html+='<th class="num" style="width:7%">% Rev</th></tr></thead><tbody>';
  function pRow(label,field,bold,comp){const cls=bold?(comp?'grand-total':'subtotal'):'';html+='<tr class="'+cls+'"><td>'+label+'</td>';colData.forEach(d=>{html+='<td class="'+numClass(d[field])+'" style="font-size:11px">'+fmt(d[field])+'</td>'});if(showTotal)html+='<td class="'+numClass(tot[field])+'">'+fmt(tot[field])+'</td>';const p=tot.rev!==0?(tot[field]/tot.rev*100).toFixed(1)+'%':'-';html+='<td class="num">'+p+'</td></tr>'}
  html+='<tr class="section-header"><td colspan="'+nc+'">Revenue</td></tr>';
  const revDepts=new Set();sel.forEach(i=>{const d=getPNLDetail(dates[i].key);Object.keys(d).forEach(k=>{if(k.startsWith('Revenue|'))revDepts.add(k.split('|')[1])})});
  const hasRD=revDepts.size>0;
  html+='<tr class="subtotal" style="cursor:'+(hasRD?'pointer':'default')+'" '+(hasRD?'onclick="document.querySelectorAll(\'.pnl-rv\').forEach(r=>r.classList.toggle(\'visible\'))"':'')+'><td>'+(hasRD?'<span style="font-size:10px;margin-right:4px;display:inline-block;transition:transform .2s">&#9654;</span>':'')+'Revenue</td>';
  colData.forEach(d=>{html+='<td class="'+numClass(d.rev)+'" style="font-size:11px">'+fmt(d.rev)+'</td>'});

function renderCashFlow(){

  const cols=sel.length<=6?sel:[sel[0],sel[sel.length-1]];const showTotal=cols.length>1;
  function calcCF(ci){
    const dk=dates[ci].key;const eA=getAssets(dk);const eL=getLiabilities(dk);
    const oi=ci>0?ci-1:ci;const oA=ci>0?getAssets(dates[oi].key):{};const oL=ci>0?getLiabilities(dates[oi].key):{};
    const p=getPNL(dk);const ni=calcNetIncome(p);
    function dA(s){return gv(eA,s)-gv(oA,s)}function dL(s){return gv(eL,s)-gv(oL,s)}
    const da=-dA('ACC Dep / Amortization')-dA('ACC Dep / Depreciation');const prov=dL('Provisions')-dA('Provisions');
    const wc=[{n:'Inventories',v:-dA('Inventories')},{n:'Accounts Receivable',v:-dA('Accounts Recivable')},{n:'Prepaid Expenses',v:-dA('Prepaid')},{n:'Accrued Income',v:-dA('Accrued Income')},{n:'Staff Receivables',v:-dA('Staff receivables')},{n:'VAT (Net)',v:-dA('VAT')+dL('VAT')},{n:'WHT',v:-dA('WHT')},{n:'AP Advances',v:-dA('AP Advances')},{n:'Accounts Payable',v:dL('Accounts Payable')},{n:'Accruals',v:dL('Accruals')},{n:'Tips',v:dL('Tips')}];
    const wcT=wc.reduce((s,x)=>s+x.v,0);const opCF=ni+da+prov+wcT;
    const inv=[{n:'Fixed Assets',v:-dA('Fixed Assets')-dA('Fixed Assets/AI')},{n:'WIP',v:-dA('WIP')},{n:'Investments',v:-dA('Investments in Subsidiaries')},{n:'Refundable Deposits',v:-dA('Refundable deposits')}];
    const invCF=inv.reduce((s,x)=>s+x.v,0);
    const fin=[{n:'Loans',v:dL('loan')+dL('Loan due to')},{n:'Lease',v:dL('Lease liabilities')+dL('Lease')},{n:'Capital',v:dL('Capital')},{n:'IC',v:-dA('IC')+dL('IC')}];
    const finCF=fin.reduce((s,x)=>s+x.v,0);const totCF=opCF+invCF+finCF;
    const oCash=gv(oA,'cash and cash equivalents')+gv(oA,'Cash in transit');const cCash=gv(eA,'cash and cash equivalents')+gv(eA,'Cash in transit');
    return{ni,da,prov,wc,wcT,opCF,inv,invCF,fin,finCF,totCF,oCash,cCash};
  }

    const da=-dA('ACC Dep / Amortization')-dA('ACC Dep / Depreciation');const prov=dL('Provisions')-dA('Provisions');
    const wc=[{n:'Inventories',v:-dA('Inventories')},{n:'Accounts Receivable',v:-dA('Accounts Recivable')},{n:'Prepaid Expenses',v:-dA('Prepaid')},{n:'Accrued Income',v:-dA('Accrued Income')},{n:'Staff Receivables',v:-dA('Staff receivables')},{n:'VAT (Net)',v:-dA('VAT')+dL('VAT')},{n:'WHT',v:-dA('WHT')},{n:'AP Advances',v:-dA('AP Advances')},{n:'Accounts Payable',v:dL('Accounts Payable')},{n:'Accruals',v:dL('Accruals')},{n:'Tips',v:dL('Tips')}];
    const wcT=wc.reduce((s,x)=>s+x.v,0);const opCF=ni+da+prov+wcT;
    const inv=[{n:'Fixed Assets',v:-dA('Fixed Assets')-dA('Fixed Assets/AI')},{n:'WIP',v:-dA('WIP')},{n:'Investments',v:-dA('Investments in Subsidiaries')},{n:'Refundable Deposits',v:-dA('Refundable deposits')}];
    const invCF=inv.reduce((s,x)=>s+x.v,0);
    const fin=[{n:'Loans',v:dL('loan')+dL('Loan due to')},{n:'Lease',v:dL('Lease liabilities')+dL('Lease')},{n:'Capital',v:dL('Capital')},{n:'IC',v:-dA('IC')+dL('IC')}];
    const finCF=fin.reduce((s,x)=>s+x.v,0);const totCF=opCF+invCF+finCF;
    const oCash=gv(oA,'cash and cash equivalents')+gv(oA,'Cash in transit');const cCash=gv(eA,'cash and cash equivalents')+gv(eA,'Cash in transit');
    return{ni,da,prov,wc,wcT,opCF,inv,invCF,fin,finCF,totCF,oCash,cCash};
  })();
  let html='<div class="kpi-grid">';
  html+='<div class="kpi-card '+(tot.opCF>=0?'green':'red')+'"><div class="kpi-label">Operating Cash Flow</div><div class="kpi-value '+(tot.opCF>=0?'positive':'negative')+'">'+fmt(tot.opCF)+'</div></div>';

  const nc=1+cols.length+(showTotal?1:0);

  html+='</tbody></table>';document.getElementById('tab-cashflow').innerHTML=html;
}

  const colData=cols.map(ci=>calcD(ci));

  html+='<tr><td>Accounts Payable</td>';colData.forEach(d=>{html+='<td class="num positive" style="font-size:11px">'+fmt(d.ap)+'</td>'});if(showTotal)html+='<td class="num positive">'+fmt(tot.ap)+'</td>';html+='</tr>';
  html+='<tr><td>COGS</td>';colData.forEach(d=>{html+='<td class="num negative" style="font-size:11px">'+fmt(d.cos)+'</td>'});if(showTotal)html+='<td class="num negative">'+fmt(tot.cos)+'</td>';html+='</tr>';
  html+='<tr><td>Period</td>';colData.forEach(()=>{html+='<td class="num" style="font-size:11px">1 month (30 days)</td>'});if(showTotal)html+='<td class="num">'+mo+' months ('+mo*30+' days)</td>';html+='</tr>';
  html+='<tr class="spacer"><td colspan="'+nc+'"></td></tr>';

// === MONTH PICKER ===
function buildMonthGrid(){
  const c=document.getElementById('monthGrid');c.innerHTML='';
  const yrs={};dates.forEach((d,i)=>{const y=d.label.split(' ')[1];if(!yrs[y])yrs[y]=[];yrs[y].push(i)});
  Object.keys(yrs).sort().forEach(y=>{
    const row=document.createElement('div');row.className='mp-year-row';
    const yl=document.createElement('span');yl.className='mp-year-label';yl.textContent=y;
    yl.onclick=function(){toggleYear(yrs[y])};row.appendChild(yl);
    yrs[y].forEach(i=>{
      const ch=document.createElement('span');ch.className='mp-chip';ch.textContent=dates[i].label.split(' ')[0];
      ch.dataset.idx=i;ch.onclick=function(){toggleMonth(i)};row.appendChild(ch);
    });
    c.appendChild(row);
  });
  syncChips();
}
function syncChips(){
  document.querySelectorAll('.mp-chip').forEach(ch=>{
    ch.classList.toggle('selected',selectedIndices.has(parseInt(ch.dataset.idx)));
  });
  document.getElementById('selectionSummary').textContent=selLabel();
}
function toggleMonth(i){
  if(pickerMode==='range')return;
  if(selectedIndices.has(i))selectedIndices.delete(i);else selectedIndices.add(i);
  syncChips();renderAll();
}
function toggleYear(indices){
  if(pickerMode==='range')return;
  const allSel=indices.every(i=>selectedIndices.has(i));
  indices.forEach(i=>{if(allSel)selectedIndices.delete(i);else selectedIndices.add(i)});
  syncChips();renderAll();
}
function selectAll(){
  dates.forEach((_,i)=>selectedIndices.add(i));
  if(pickerMode==='range'){document.getElementById('rangeFrom').value=0;document.getElementById('rangeTo').value=dates.length-1}
  syncChips();renderAll();
}
function clearAll(){
  selectedIndices.clear();syncChips();renderAll();
}
function setMode(m){
  pickerMode=m;
  document.getElementById('mpModeRange').classList.toggle('active',m==='range');
  document.getElementById('mpModeCustom').classList.toggle('active',m==='custom');
  document.getElementById('rangeInputs').style.display=m==='range'?'flex':'none';
  if(m==='range')applyRange();
}
function applyRange(){
  const f=parseInt(document.getElementById('rangeFrom').value);
  const t=parseInt(document.getElementById('rangeTo').value);
  selectedIndices.clear();
  for(let i=Math.min(f,t);i<=Math.max(f,t);i++)selectedIndices.add(i);
  syncChips();renderAll();
}

// === INIT ===
function populateRangeDropdowns(){
  const sf=document.getElementById('rangeFrom');const st=document.getElementById('rangeTo');
  sf.innerHTML='';st.innerHTML='';
  dates.forEach((d,i)=>{
    sf.innerHTML+='<option value="'+i+'">'+d.label+'</option>';
    st.innerHTML+='<option value="'+i+'">'+d.label+'</option>';
  });
  st.value=dates.length-1;
  sf.onchange=function(){if(pickerMode==='range')applyRange()};
  st.onchange=function(){if(pickerMode==='range')applyRange()};
}
function renderAll(){
  renderBS();renderPNL();renderEquity();renderCashFlow();renderDPO();
}

// === DOWNLOAD EXCEL ===
function downloadExcel(){
  const sel=selSorted();if(!sel.length){alert('Select at least one month.');return}
  let csv='';const q=v=>'"'+(v===null||v===undefined?'':String(v).replace(/"/g,'""'))+'"';
  // BS
  csv+='BALANCE SHEET\n';csv+='Account';sel.forEach(i=>{csv+=','+q(dates[i].label)});csv+='\n';
  function addBSSection(title,getter,sign){
    csv+=q(title)+'\n';
    const allSegs=new Set();sel.forEach(i=>{const d=getter(dates[i].key);if(d)Object.keys(d).forEach(s=>allSegs.add(s))});
    [...allSegs].sort().forEach(seg=>{
      csv+=q(seg);sel.forEach(i=>{csv+=','+((gv(getter(dates[i].key),seg)*sign)||0)});csv+='\n';
      const allSubs=new Set();sel.forEach(i=>{const d=getter(dates[i].key);if(d&&d[seg]&&typeof d[seg]==='object')Object.keys(d[seg]).forEach(s=>allSubs.add(s))});
      if(allSubs.size>1||(allSubs.size===1&&![...allSubs][0].match(/^General$/i))){
        [...allSubs].sort().forEach(sub=>{
          csv+=q('  '+sub);sel.forEach(i=>{const d=getter(dates[i].key);const v=d&&d[seg]&&typeof d[seg]==='object'?(d[seg][sub]||0)*sign:0;csv+=','+v});csv+='\n';
        });
      }
    });
    csv+=q('Total '+title);sel.forEach(i=>{csv+=','+(sumSection(getter(dates[i].key))*sign)});csv+='\n';
  }
  addBSSection('Assets',getAssets,1);addBSSection('Liabilities',getLiabilities,-1);addBSSection('Equity',getEquity,-1);
  csv+='\n';
  // PNL
  csv+='PROFIT & LOSS\nCategory,'+q(selLabel())+'\n';
  const pnlAgg=sumPNLForSelected();
  const rev=-(pnlAgg['Revenue']||0);const cos=(pnlAgg['Cost of sales']||0);const gross=rev-cos;
  const pe=(pnlAgg['Personnel']||0);const np=-(pnlAgg['Non personnel']||0);
  const oh=(pnlAgg['Overheads']||0);const ca=(pnlAgg['CAC']||0);
  const opex=pe+np+oh+ca;const ebitda=gross-opex;const be=(pnlAgg['Below EBITDA']||0);const ni=ebitda-be;
  csv+='Revenue,'+rev+'\nCost of Sales,'+cos+'\nGross Profit,'+gross+'\nPersonnel,'+pe+'\nNon-Personnel,'+np+'\nOverheads,'+oh+'\nCAC,'+ca+'\nTotal OpEx,'+opex+'\nEBITDA,'+ebitda+'\nBelow EBITDA,'+be+'\nNet Income,'+ni+'\n\n';
  // Cash Flow
  csv+='CASH FLOW\n';
  const fi=sel[0];const li=sel[sel.length-1];
  const endA=getAssets(dates[li].key);const endL=getLiabilities(dates[li].key);
  const openIdx=fi>0?fi-1:fi;
  const openA=fi>0?getAssets(dates[openIdx].key):{};const openL=fi>0?getLiabilities(dates[openIdx].key):{};
  csv+='Net Income,'+ni+'\nDepreciation & Amortization,'+(-(gv(endA,'ACC Dep / Amortization')-gv(openA,'ACC Dep / Amortization'))-(gv(endA,'ACC Dep / Depreciation')-gv(openA,'ACC Dep / Depreciation')))+'\n';
  csv+='\n';
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='Financial_Statements_'+currentEntity+'.csv';a.click();URL.revokeObjectURL(url);
}

function refreshData(){
  var scriptPath=decodeURIComponent(window.location.pathname).replace(/\/[^\/]*$/,'').replace(/^\//,'')+'\\RefreshData.ps1';
  if(scriptPath.startsWith('\\\\')){scriptPath=scriptPath.substring(1)}
  var msg='To refresh data from TBs.xlsx:\n\n';
  msg+='1. Open PowerShell\n';
  msg+='2. Run this command:\n\n';
  msg+='powershell -ExecutionPolicy Bypass -File "'+scriptPath+'"\n\n';
  msg+='3. After it finishes, reload this page (F5)\n\n';
  msg+='Copy the command to clipboard?';
  if(confirm(msg)){
    var cmd='powershell -ExecutionPolicy Bypass -File "'+scriptPath+'"';
    navigator.clipboard.writeText(cmd).then(function(){alert('Command copied! Paste it in PowerShell and run.')}).catch(function(){prompt('Copy this command:',cmd)});
  }
}
